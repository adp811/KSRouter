apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: qwen-0-5b-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: qwen-0-5b-predictor
  minReplicaCount: 1
  maxReplicaCount: 3
  pollingInterval: 15
  cooldownPeriod: 60
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
          - type: Percent
            value: 10
            periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
          - type: Percent
            value: 100
            periodSeconds: 15
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      metricName: router_recent_requests
      threshold: "10"
      query: |
        sum(router_recent_requests)
