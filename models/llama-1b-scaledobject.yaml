apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: llama-1b-scaler
  namespace: default
spec:
  scaleTargetRef:
    name: llama-1b-predictor
  minReplicaCount: 1
  maxReplicaCount: 2
  pollingInterval: 15
  cooldownPeriod: 60
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
          - type: Percent
            value: 10
            periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
          - type: Percent
            value: 100
            periodSeconds: 15
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      metricName: router_medium_tier_requests_total
      threshold: "10"
      query: |
        sum(router_recent_requests_by_tier{tier="medium"})
