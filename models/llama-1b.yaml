apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: llama-1b
  namespace: default
  annotations:
    serving.kserve.io/autoscalerClass: external
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 2
    model:
      modelFormat:
        name: gguf
      runtime: llama-cpp-server
      args:
        - --model
        - /mnt/gguf-models/llama-3.2-1b-instruct-q4_k_m.gguf
      resources:
        requests:
          cpu: 1000m
          memory: 1Gi
        limits:
          cpu: 4000m
          memory: 2Gi
