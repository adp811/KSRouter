apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen-3b
  namespace: default
spec:
  predictor:
    model:
      modelFormat:
        name: gguf
      runtime: llama-cpp-server
      args:
        - --model
        - /mnt/gguf-models/qwen2.5-3b-instruct-q4_k_m.gguf
      resources:
        requests:
          cpu: 1000m
          memory: 2Gi
        limits:
          cpu: 4000m
          memory: 3Gi
