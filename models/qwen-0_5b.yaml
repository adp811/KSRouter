apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen-0-5b
  namespace: default
  annotations:
    serving.kserve.io/autoscalerClass: external
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 3
    model:
      modelFormat:
        name: gguf
      runtime: llama-cpp-server
      args:
        - --model
        - /mnt/gguf-models/qwen2.5-0.5b-instruct-q4_k_m.gguf
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 1Gi
