apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: llama-cpp-server
spec:
  annotations:
    prometheus.kserve.io/path: /metrics
    prometheus.kserve.io/port: "8080"
  containers:
  - name: kserve-container
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - /app/llama-server
    args:
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --ctx-size
      - "4096"
      - --parallel
      - "2"
      - --threads
      - "4"
      - --metrics
    ports:
    - containerPort: 8080
      name: http1
      protocol: TCP
    readinessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 5
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 1Gi
    volumeMounts:
    - name: models-volume
      mountPath: /mnt/gguf-models
  protocolVersions:
  - v1
  - v2
  supportedModelFormats:
  - name: gguf
    version: "1"
    autoSelect: true
  volumes:
  - name: models-volume
    hostPath:
      path: /mnt/models
      type: Directory
