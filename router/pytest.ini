[pytest]
asyncio_mode = auto
pythonpath = .
# integration_test.py is a standalone script meant to be run manually against
# a live router (`python tests/integration_test.py`), not a pytest suite. Its
# filename matches pytest's default `*_test.py` discovery pattern and its
# `test_single_prompt` helper gets mistakenly collected as a test (it expects
# positional args, not fixtures), so exclude it from collection here.
addopts = --ignore=tests/integration_test.py
